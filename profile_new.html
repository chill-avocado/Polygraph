<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Polygraph — New Profile</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf6ee;
  color: #4a4038;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 20px;
}

.page {
  width: 100%;
  max-width: 480px;
}

.back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: #a89a8c;
  font-size: .85rem;
  cursor: pointer;
  margin-bottom: 24px;
  font-family: Arial, sans-serif;
}

.back:hover { color: #6b5b52; }

h1 {
  font-size: 1.6rem;
  font-weight: 600;
  color: #6b5b52;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
  text-align: center;
}

.subtitle {
  text-align: center;
  color: #a89a8c;
  font-size: .9rem;
  margin-bottom: 34px;
}

.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 28px 26px;
  margin-bottom: 28px;
  box-shadow: 0 2px 10px rgba(150,120,100,0.08);
}

.card h2 {
  font-size: .85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #c9a99a;
  margin-bottom: 18px;
}

.field { margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: .75rem;
  color: #a89a8c;
  margin-bottom: 5px;
}

input[type="text"] {
  width: 100%;
  border: 1px solid #ecdfd2;
  background: #fdfaf4;
  border-radius: 10px;
  padding: 11px 12px;
  font-size: .9rem;
  color: #4a4038;
  font-family: Arial, sans-serif;
}

input[type="text"]:focus {
  outline: none;
  border-color: #e6bcb0;
}

.consent-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

.consent-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #eec3ba;
  flex-shrink: 0;
}

.consent-row label {
  margin: 0;
  font-size: .8rem;
  color: #8a7c70;
}

.next-btn {
  width: 100%;
  background: #cdeadb;
  color: #3f6b56;
  border: none;
  border-radius: 999px;
  padding: 15px;
  font-size: .95rem;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: background .2s;
}

.next-btn:hover { background: #b8e0cb; }

.next-btn:disabled {
  background: #f2e9dd;
  color: #c3b6a8;
  cursor: default;
}
</style>
</head>
<body>

<div class="page">
  <button class="back" onclick="location.href='profiles.html'">&lsaquo; Profiles</button>

  <h1>New Profile</h1>
  <p class="subtitle">A calmer way to read the truth.</p>

  <div class="card">
    <h2>Subject Details</h2>
    <div class="field">
      <label for="subj-name">Subject Name</label>
      <input type="text" id="subj-name" placeholder="Full name" autocomplete="off"/>
    </div>
    <div class="consent-row">
      <input type="checkbox" id="consent"/>
      <label for="consent">Subject has provided informed consent</label>
    </div>
  </div>

  <button class="next-btn" id="next-btn" disabled onclick="setUpBaseline()">Set up Baseline</button>
</div>

<script>
"use strict";
const PROFILES_KEY = 'polygraph_profiles';
const CURRENT_KEY = 'polygraph_current';

const nameInput = document.getElementById('subj-name');
const consent = document.getElementById('consent');
const btn = document.getElementById('next-btn');

function validate() {
  btn.disabled = !(nameInput.value.trim() && consent.checked);
}

nameInput.addEventListener('input', validate);
consent.addEventListener('change', validate);

function loadProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILES_KEY)) || []; }
  catch (e) { return []; }
}

function setUpBaseline() {
  if (btn.disabled) return;
  const profiles = loadProfiles();
  const profile = {
    id: Date.now().toString(),
    name: nameInput.value.trim(),
    consent: true,
    baseline: false,
    created: new Date().toISOString()
  };
  profiles.push(profile);
  localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
  localStorage.setItem(CURRENT_KEY, profile.id);
  location.href = 'baseline_focus.html';
}
</script>

</body>
</html>
