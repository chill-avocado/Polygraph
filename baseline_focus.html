<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<title>Polygraph — Baseline Focus</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  height: 100%;
}

body {
  background: #faf6ee;
  color: #4a4038;
  font-family: Arial, sans-serif;
  position: relative;
  overflow: hidden;
}

/* Ambient blue hue on the same cadence as the focus dot — ordinary quiet
   respiration (~13 breaths/min), not a paced breathing exercise.
   Done as an overlay whose OPACITY animates, not body background-color:
   background-color repaints the whole viewport every frame, opacity is handled
   on the compositor for free. */
#hue {
  position: fixed;
  inset: 0;
  background: #dce9f2;
  opacity: 0;
  pointer-events: none;
  z-index: 0;
}

body.breathing-bg #hue {
  animation: breathHue 4.5s ease-in-out infinite;
  will-change: opacity;
}

@keyframes breathHue {
  0%   { opacity: 0; }
  42%  { opacity: 0.55; }
  100% { opacity: 0; }
}

/* ── Intro overlay — instructions live only here, dismissed by tapping ── */
#intro {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 34px;
  background: #faf6ee;
  z-index: 10;
  padding: 20px;
}

#intro .instructions {
  max-width: 380px;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

#intro .instructions .primary,
#intro .instructions .secondary {
  font-size: 1rem;
  color: #6b5b52;
  line-height: 1.6;
}

#intro .instructions p {
  position: relative;
}

.type-cursor {
  position: absolute;
  color: #ea9b4e;
  font-weight: 700;
  animation: blink 0.8s steps(1) infinite;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  50.01%, 100% { opacity: 0; }
}

.type-letter {
  color: #c9915f;
  transition: color .18s ease;
  animation: letterShine .3s ease-out;
}

@keyframes letterShine {
  0%   { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}

.type-letter.set {
  color: #ea9b4e;
}

.type-letter.dry {
  color: #6b5b52;
}

.continue-btn {
  background: #f3d9d3;
  color: #6b4a42;
  border: none;
  border-radius: 999px;
  padding: 13px 38px;
  font-size: .95rem;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: background .2s, opacity .3s;
}

.continue-btn:hover {
  background: #eec3ba;
}

.continue-btn.hidden {
  opacity: 0;
  pointer-events: none;
}

.slide {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 34px;
}

.welcome-text {
  font-size: 2rem;
  font-weight: 600;
  color: #6b5b52;
  letter-spacing: 0.04em;
}

.dots {
  display: flex;
  gap: 8px;
}

.dots .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #f2e9dd;
  transition: background .3s;
}

.dots .dot.active {
  background: #c9a99a;
}

/* The wrapper carries the position (a transform), the dot itself carries the
   breathing scale — one transform each, so the two never fight over the
   property, and neither ever touches layout. */
#dot-wrap {
  position: absolute;
  left: 0;
  top: 0;
  width: 34px;
  height: 34px;
  z-index: 1;
  will-change: transform;
}

.focus-dot {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: #bcd8ea;
}

/* Only applied once beginFocus() starts, at the same instant as body's
   breathing-bg class — keeps the two cycles phase-locked. */
.focus-dot.breathing {
  animation: breathe 4.5s ease-in-out infinite;
}

/* Ordinary quiet respiration — a slightly quicker rise than fall, no hold, and
   a shallow amplitude. Nothing to follow along with; just something to rest on. */
@keyframes breathe {
  0%   { transform: scale(0.92); }
  42%  { transform: scale(1.1); }
  100% { transform: scale(0.92); }
}

.wall-paddle {
  position: absolute;
  background: #c2b09a;   /* same as the hourglass body */
  opacity: 0.9;
  border-radius: 0;
  z-index: 3;
  /* Moved with transform, never left/top — writing left/top every frame forces
     a layout pass per paddle per frame, which is what made this crawl.
     No CSS transition: positions are servo-driven in JS, so a transition would
     only lag the paddle behind its own target. */
  will-change: transform;
}

.wall-paddle.horizontal {
  width: 64px;
  height: 8px;
}

.wall-paddle.vertical {
  width: 8px;
  height: 64px;
}

/* Each paddle is anchored to its wall; transform slides it along that wall. */
#paddle-top    { top: 0; left: 0; }
#paddle-bottom { bottom: 0; left: 0; }
#paddle-left   { left: 0; top: 0; }
#paddle-right  { right: 0; top: 0; }

/* ── Completion state — replaces the focus dot once the baseline window closes ── */
#complete {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #faf6ee;
  z-index: 5;
}

#complete.visible {
  display: flex;
}

#complete .complete-title {
  font-size: 1.3rem;
  font-weight: 600;
  color: #6b5b52;
  letter-spacing: 0.03em;
}

#complete .complete-sub {
  font-size: .9rem;
  color: #a89a8c;
}

/* ── Hourglass — dead center, pastel-blue sand, no numeric countdown ── */
#hourglass-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 76px;
  height: 120px;
  z-index: 2;
}

/* Falling grains — each is an independently simulated particle (position set
   per frame in JS), so the stream never repeats a fixed pattern. */
.grain {
  fill: #6ea9cf;
  opacity: 0;
}

/* Hourglass paddles — the minimum that still does the boundary's job: the dot
   is 34px across and the paddle is always parked on the predicted contact, so
   34 + a small margin each side is all the cover that's needed. */
.hg-h { width: 44px; height: 8px; }
.hg-v { width: 8px; height: 44px; }

/* Demo-only control — visually set apart from the real UI (dashed border,
   fixed corner) so it reads as a dev aid, not part of the flow itself. */
.skip-demo {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 50;
  background: transparent;
  border: 1px dashed #d3c3b4;
  color: #a89a8c;
  font-size: .72rem;
  letter-spacing: 0.03em;
  padding: 6px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-family: Arial, sans-serif;
}

.skip-demo:hover {
  background: #fdfaf4;
  color: #6b5b52;
}
</style>
</head>
<body>

<button class="skip-demo" onclick="skipBaseline()">Skip (demo)</button>

<div id="intro">
  <div class="slide" id="slide-welcome">
    <h1 class="welcome-text">Welcome</h1>
    <button class="continue-btn" onclick="goToInstructions()">Next</button>
  </div>

  <div class="slide" id="slide-instructions" style="display:none">
    <div class="instructions">
      <p class="primary" id="primary-text"></p>
      <p class="secondary" id="secondary-text"></p>
    </div>
    <button class="continue-btn hidden" id="continue-btn" onclick="beginFocus()">Continue</button>
  </div>

  <div class="dots">
    <span class="dot active" id="dot1"></span>
    <span class="dot" id="dot2"></span>
  </div>
</div>

<div id="hue"></div>

<div id="dot-wrap">
  <div class="focus-dot" id="focus-dot"></div>
</div>

<div class="wall-paddle horizontal" id="paddle-top"></div>
<div class="wall-paddle horizontal" id="paddle-bottom"></div>
<div class="wall-paddle vertical" id="paddle-left"></div>
<div class="wall-paddle vertical" id="paddle-right"></div>

<!-- Frame the hourglass's exclusion zone with short servo paddles — same
     tracking behaviour as the wall paddles, on the four faces of the zone. -->
<div class="wall-paddle hg-h" id="hg-paddle-top"></div>
<div class="wall-paddle hg-h" id="hg-paddle-bottom"></div>
<div class="wall-paddle hg-v" id="hg-paddle-left"></div>
<div class="wall-paddle hg-v" id="hg-paddle-right"></div>

<div id="hourglass-wrap">
  <svg viewBox="0 0 76 120" width="100%" height="100%">
    <defs>
      <!-- Sides stay near-vertical under the caps, then sweep inward — that
           concave sweep is what reads as an hourglass rather than a triangle. -->
      <path id="bulb-top" d="M11,8 C11,38 35,46 35,58 L41,58 C41,46 65,38 65,8 Z"/>
      <path id="bulb-bottom" d="M35,62 C35,74 11,82 11,112 L65,112 C65,82 41,74 41,62 Z"/>
      <!-- One continuous outline, including the straight walls of the neck
           channel, so the two bulbs are visibly joined. The channel is just
           wide enough for the grain stream to pass through. -->
      <path id="glass" d="M11,8 C11,38 35,46 35,58 L35,62 C35,74 11,82 11,112
                          L65,112 C65,82 41,74 41,62 L41,58 C41,46 65,38 65,8 Z"/>
      <clipPath id="clip-top"><use href="#bulb-top"/></clipPath>
      <clipPath id="clip-bottom"><use href="#bulb-bottom"/></clipPath>
      <!-- Neck channel + lower bulb, so grains stay visible through the neck. -->
      <clipPath id="clip-stream">
        <path d="M35,56 L41,56 L41,62 C41,74 65,82 65,112 L11,112 C11,82 35,74 35,62 Z"/>
      </clipPath>
    </defs>

    <!-- Sand sits under the glass outline so the rims read cleanly. -->
    <path id="top-sand" fill="#bcd8ea" clip-path="url(#clip-top)" d=""/>
    <path id="bottom-sand" fill="#bcd8ea" clip-path="url(#clip-bottom)" d=""/>

    <!-- Falling grains, created in JS. No clip-path here on purpose: the grains
         are already kept inside the glass by the cone clamp in the simulation,
         and clipping a group that moves every frame forces the mask to be
         re-rasterised every frame. -->
    <g id="grain-layer"></g>

    <use href="#glass" fill="none" stroke="#c2b09a" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- End caps. -->
    <rect x="6" y="3" width="64" height="5" rx="2.5" fill="#c2b09a"/>
    <rect x="6" y="112" width="64" height="5" rx="2.5" fill="#c2b09a"/>
  </svg>
</div>

<div id="complete">
  <div class="complete-title">Baseline Complete</div>
  <div class="complete-sub">Please pass the device back to the examiner.</div>
  <button class="continue-btn" onclick="proceedFromBaseline()" style="margin-top:14px">Continue</button>
</div>

<script>
"use strict";
const BASELINE_SECONDS = 120;
const topSand = document.getElementById('top-sand');
const bottomSand = document.getElementById('bottom-sand');
let progressAnim = null;
let grainAnim = null;
let pouring = false;
let pileY = 111;   // current top of the bottom pile (svg y) — grains land here

const NECK_Y = 60;         // centre of the neck in svg units
const CX = 38;             // hourglass centre-line
let flow = 1;              // how hard the neck is pouring, 1 → 0

// The level has to be solved from the AREA drained, not moved at a constant
// rate — the bulbs are wide at the caps and pinch at the neck, so a constant
// rate looks empty long before the clock is up. And the sides are beziers that
// hang near-vertical under the caps, so approximating them as a straight taper
// still under-counts the sand up top. Sampling the real curve is what finally
// lines the drain up with the clock.
function bez(p0, p1, p2, p3, t) {
  const m = 1 - t;
  return m*m*m*p0 + 3*m*m*t*p1 + 3*m*t*t*p2 + t*t*t*p3;
}

// Build a (y → cumulative area) table for a bulb from its left-hand bezier.
// Area accumulates from the first sampled end toward the last.
function buildProfile(xs, ys) {
  const N = 300, pts = [], cum = [0];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    pts.push({
      y: bez(ys[0], ys[1], ys[2], ys[3], t),
      w: 76 - 2 * bez(xs[0], xs[1], xs[2], xs[3], t)   // mirrored about the centre-line
    });
  }
  for (let i = 1; i <= N; i++) {
    const dy = Math.abs(pts[i].y - pts[i - 1].y);
    cum.push(cum[i - 1] + dy * (pts[i].w + pts[i - 1].w) / 2);
  }
  return { pts, cum, total: cum[N] };
}

const TOP_PROFILE = buildProfile([11, 11, 35, 35], [8, 38, 46, 58]);   // cap → neck
const BOT_PROFILE = buildProfile([35, 35, 11, 11], [62, 74, 82, 112]); // neck → cap

// Share of a bulb's capacity occupied (measured from the far end) → surface y.
function levelAt(profile, occupied) {
  const target = profile.total * (1 - occupied);
  const cum = profile.cum;
  let lo = 0, hi = cum.length - 1;
  while (lo < hi) { const mid = (lo + hi) >> 1; if (cum[mid] < target) lo = mid + 1; else hi = mid; }
  const i = Math.max(1, lo);
  const c0 = cum[i - 1], c1 = cum[i];
  const f = c1 > c0 ? (target - c0) / (c1 - c0) : 0;
  return profile.pts[i - 1].y + (profile.pts[i].y - profile.pts[i - 1].y) * f;
}

// Inverse: what share is occupied when the surface sits at y?
function occupiedAtLevel(profile, y) {
  const pts = profile.pts, cum = profile.cum;
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i - 1].y, b = pts[i].y;
    if ((y >= a && y <= b) || (y <= a && y >= b)) {
      const f = b !== a ? (y - a) / (b - a) : 0;
      return 1 - (cum[i - 1] + (cum[i] - cum[i - 1]) * f) / profile.total;
    }
  }
  return y <= pts[0].y ? 1 : 0;
}

// Start visibly shy of the cap — but still drain to empty over the full window.
const START_Y = 13;
const START_REMAIN = occupiedAtLevel(TOP_PROFILE, START_Y);

const topLevel = remain => levelAt(TOP_PROFILE, remain);
const bottomLevel = filled => levelAt(BOT_PROFILE, filled);

let lastTopY = -1, lastBotY = -1;

function setHourglass(frac) {
  // Volume leaves the top at a constant rate, so it runs out precisely on time.
  const remain = START_REMAIN * (1 - frac);
  const filled = START_REMAIN * frac;

  const surfaceTop = topLevel(remain);
  const surfaceBottom = bottomLevel(filled);

  // Cheap state the grain sim reads every frame.
  // The stream runs full while there's plenty left, then thins out over the
  // last stretch as the top runs dry — rather than pouring at full tilt with
  // nothing left and then stopping dead.
  flow = Math.min(1, Math.max(0, remain / (0.25 * START_REMAIN)));
  pileY = surfaceBottom;
  pouring = frac > 0.005 && flow > 0.001;

  // These two paths are clip-pathed, and the level only creeps ~0.4px/sec — so
  // rewriting them every frame re-rasterises the clip mask 60x a second for no
  // visible gain. Only write once the surface has actually moved enough to see.
  // Both surfaces are drawn full-width and clipped to the bulb, so they can
  // curve freely without ever escaping the glass.
  if (Math.abs(surfaceTop - lastTopY) > 0.04) {
    lastTopY = surfaceTop;
    // Draining sand pulls into a funnel: the surface dips in the middle.
    const dip = Math.min(5, frac * 9);
    topSand.setAttribute('d',
      `M0,${surfaceTop} Q${CX},${surfaceTop + dip * 2} 76,${surfaceTop} L76,59 L0,59 Z`
    );
  }

  if (Math.abs(surfaceBottom - lastBotY) > 0.04) {
    lastBotY = surfaceBottom;
    // The pile below grows as a mound under the stream, not a flat level.
    const mound = Math.min(5, frac * 9);
    bottomSand.setAttribute('d',
      `M0,${surfaceBottom} Q${CX},${surfaceBottom - mound * 2} 76,${surfaceBottom} L76,114 L0,114 Z`
    );
  }
}

// ── Falling grains — independent particles under gravity. Every respawn
// re-randomises speed, scatter and size, so the stream never settles into a
// repeating pattern the way a shared sine wave did. ──
const GRAIN_COUNT = 9;
const GRAVITY = 200;       // svg units / sec²
const SVG_NS = 'http://www.w3.org/2000/svg';
let grainParts = [];

function spawnGrain(p, scatter) {
  p.x = CX + (Math.random() - 0.5) * 1.8;    // emerges within the neck's width
  p.y = scatter
    ? NECK_Y + Math.random() * Math.max(4, pileY - NECK_Y)  // spread on first fill
    : NECK_Y - 1 + Math.random() * 2;
  p.vy = 5 + Math.random() * 18;
  p.vx = (Math.random() - 0.5) * 5;
  p.r = 0.85 + Math.random() * 0.85;
  p.o = 0.5 + Math.random() * 0.5;
  p.el.setAttribute('r', p.r.toFixed(2));
  // As the flow tapers, grains wait longer before setting off again — the
  // stream thins to a trickle and then to nothing instead of cutting out.
  p.wait = flow > 0.02 ? (1 / flow - 1) * (0.04 + Math.random() * 0.22) : 1e9;
}

function buildGrains() {
  const layer = document.getElementById('grain-layer');
  layer.innerHTML = '';
  grainParts = [];
  for (let i = 0; i < GRAIN_COUNT; i++) {
    const el = document.createElementNS(SVG_NS, 'circle');
    el.setAttribute('class', 'grain');
    layer.appendChild(el);
    const p = { el };
    spawnGrain(p, true);
    grainParts.push(p);
  }
}

function startGrains() {
  buildGrains();
  let last = performance.now();
  function step(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05;

    grainParts.forEach(p => {
      if (!pouring) { p.el.style.opacity = 0; return; }
      if (p.wait > 0) { p.wait -= dt; p.el.style.opacity = 0; return; }

      p.vy += GRAVITY * dt;    // accelerates as it falls
      p.y += p.vy * dt;
      p.x += p.vx * dt;

      // Keep each grain inside the neck and the widening lower cone, nudging it
      // back if the lateral drift would carry it into the glass.
      const maxOff = Math.min(26, Math.max(1.4, 3 + (p.y - 62) * 0.48));
      if (p.x < CX - maxOff) { p.x = CX - maxOff; p.vx = Math.abs(p.vx) * 0.4; }
      if (p.x > CX + maxOff) { p.x = CX + maxOff; p.vx = -Math.abs(p.vx) * 0.4; }

      if (p.y >= pileY - 0.5) spawnGrain(p, false);  // landed — new grain

      p.el.setAttribute('cx', p.x.toFixed(2));
      p.el.setAttribute('cy', p.y.toFixed(2));
      p.el.style.opacity = p.o.toFixed(2);
    });

    grainAnim = requestAnimationFrame(step);
  }
  grainAnim = requestAnimationFrame(step);
}

function stopGrains() {
  if (grainAnim) cancelAnimationFrame(grainAnim);
  grainAnim = null;
  grainParts.forEach(p => p.el.style.opacity = 0);
}

// ── Typewriter effect (same ink-drying treatment as the analyzing screen) ──
// ~250 wpm average silent reading pace ≈ 24 chars/sec ≈ 42ms/char
const TYPE_MS = 42;

function typeInto(el, text, onDone) {
  const cursor = document.createElement('span');
  cursor.className = 'type-cursor';
  cursor.textContent = '|';
  el.appendChild(cursor);

  const chars = text.split('');
  let i = 0;
  const step = () => {
    const ch = chars[i];
    if (ch === '\n') {
      el.insertBefore(document.createElement('br'), cursor);
    } else {
      const span = document.createElement('span');
      span.className = 'type-letter';
      span.textContent = ch;
      el.insertBefore(span, cursor);
      // Chained rather than raced against a separate timer — the dry transition
      // is only scheduled once "set" has actually been applied.
      requestAnimationFrame(() => requestAnimationFrame(() => {
        span.classList.add('set');
        setTimeout(() => span.classList.replace('set', 'dry'), 120);
      }));
    }
    i++;
    if (i < chars.length) {
      setTimeout(step, TYPE_MS);
    } else {
      cursor.remove();
      if (onDone) setTimeout(onDone, 400);
    }
  };
  step();
}

function goToInstructions() {
  document.getElementById('slide-welcome').style.display = 'none';
  document.getElementById('slide-instructions').style.display = 'flex';
  document.getElementById('dot1').classList.remove('active');
  document.getElementById('dot2').classList.add('active');

  typeInto(
    document.getElementById('primary-text'),
    'Sit still and breathe normally.\nLet your eyes rest on the dot.',
    () => typeInto(
      document.getElementById('secondary-text'),
      "This will take about 2 minutes — we're getting a calm baseline reading before we begin.",
      () => document.getElementById('continue-btn').classList.remove('hidden')
    )
  );
}

function beginFocus() {
  document.getElementById('intro').remove();
  // Added together in the same call so the dot's scale cycle and the
  // background hue cycle start their 12s animations phase-locked.
  document.body.classList.add('breathing-bg');
  document.getElementById('focus-dot').classList.add('breathing');
  startFocusDot();
  startGrains();

  // ── Quiet hourglass (no numbers) — driven every frame off real elapsed
  // time rather than a once-a-second tick, so the sand flows continuously
  // instead of jumping in discrete steps. ──
  const startTime = performance.now();
  function progressTick(now) {
    const frac = Math.min(1, (now - startTime) / (BASELINE_SECONDS * 1000));
    setHourglass(frac);
    if (frac >= 1) {
      document.body.classList.remove('breathing-bg');
      stopFocusDot();
      showComplete();
      return;
    }
    progressAnim = requestAnimationFrame(progressTick);
  }
  progressAnim = requestAnimationFrame(progressTick);
}

function showComplete() {
  stopGrains();
  document.getElementById('dot-wrap').style.display = 'none';
  document.querySelectorAll('.wall-paddle').forEach(p => p.style.display = 'none');
  document.getElementById('hourglass-wrap').style.display = 'none';
  document.getElementById('complete').classList.add('visible');
}

function proceedFromBaseline() {
  // Resting baseline captured — continue to the calibration questions, which
  // finish the baseline and persist it before the confirmation screen.
  location.href = 'baseline_questions.html';
}

// ── Demo-only: skip straight past the intro/2-min wait to the next screen ──
function skipBaseline() {
  const intro = document.getElementById('intro');
  if (intro) intro.remove();
  if (progressAnim) cancelAnimationFrame(progressAnim);
  stopFocusDot();
  stopGrains();
  document.body.classList.remove('breathing-bg');
  proceedFromBaseline();
}

// ── Drifting focus dot (DVD-style), roams the full screen — paddles on each
// wall track its position and light up as the contact point on collision ──
let focusAnim = null;
const paddleTop = document.getElementById('paddle-top');
const paddleBottom = document.getElementById('paddle-bottom');
const paddleLeft = document.getElementById('paddle-left');
const paddleRight = document.getElementById('paddle-right');
const PADDLE_LEN = 64;
const PADDLE_THICK = 8; // how far each paddle sits in from its wall

// Hourglass footprint (matches #hourglass-wrap's 76x120 box) plus a buffer
// the dot must never cross, in either direction.
const HOURGLASS_HALF_W = 38;
const HOURGLASS_HALF_H = 60;
const HOURGLASS_BUFFER = 15;

// Paddles glide toward their target at a fixed rate rather than being snapped
// onto it — a paddle handed a brand-new target (e.g. when it becomes the
// active face) then travels there instead of teleporting.
// Base glide speed, and the ceiling it may wind up to when it has been given
// short notice. Only ever one paddle is moving, so it can afford to be quick.
const SERVO_SPEED = 420;      // px/sec — the unhurried default
const MAX_SERVO_SPEED = 1600; // px/sec — ceiling when it has to sprint

function makeServo(v) { return { cur: v, target: v, speed: SERVO_SPEED }; }

function stepServo(s, dt) {
  const d = s.target - s.cur;
  const max = s.speed * dt;
  s.cur += Math.abs(d) <= max ? d : Math.sign(d) * max;
  return s.cur;
}

// Aim a paddle at a target it must reach within `timeAvailable`. A fixed glide
// speed is what let the dot arrive first — the paddle simply couldn't cover the
// distance in time and the dot sailed past into bare boundary (or an unformed
// corner). Give it exactly the speed the appointment needs, plus margin.
function aim(s, target, timeAvailable) {
  const need = Math.abs(target - s.cur) / Math.max(timeAvailable, 0.03) * 1.35;
  s.speed = Math.min(MAX_SERVO_SPEED, Math.max(SERVO_SPEED, need));
  s.target = target;
}

const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);

const hgPaddleTop = document.getElementById('hg-paddle-top');
const hgPaddleBottom = document.getElementById('hg-paddle-bottom');
const hgPaddleLeft = document.getElementById('hg-paddle-left');
const hgPaddleRight = document.getElementById('hg-paddle-right');

// Distance from centre to each paddle's INNER face — where the paddles are pinned.
const HG_HALF_W = HOURGLASS_HALF_W + HOURGLASS_BUFFER; // 53
const HG_HALF_H = HOURGLASS_HALF_H + HOURGLASS_BUFFER; // 75

// The paddles have thickness and sit OUTSIDE those faces, so the surface the dot
// actually meets first is the paddle's OUTER face. Colliding against the inner
// face let the dot sink the paddle's full thickness in before it reflected —
// which is exactly the "goes through a bit of the paddle" artefact.
const HG_SOLID_W = HG_HALF_W + PADDLE_THICK; // 61
const HG_SOLID_H = HG_HALF_H + PADDLE_THICK; // 83

const HG_PADDLE_LEN = 44;

// Servo state — wall paddles travel along their wall, hourglass paddles along
// their face. Only the active one is ever given a new target.
let sWallTop, sWallBottom, sWallLeft, sWallRight;
let sHgTop, sHgBottom, sHgLeft, sHgRight;

// Pin each hourglass paddle to its face and centre its travel to start.
function restHourglassPaddles() {
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  // Anchor each to its face once; transform slides it along that face after.
  hgPaddleTop.style.top = (cy - HG_HALF_H - PADDLE_THICK) + 'px';
  hgPaddleBottom.style.top = (cy + HG_HALF_H) + 'px';
  hgPaddleLeft.style.left = (cx - HG_HALF_W - PADDLE_THICK) + 'px';
  hgPaddleRight.style.left = (cx + HG_HALF_W) + 'px';
  hgPaddleTop.style.left = '0px';
  hgPaddleBottom.style.left = '0px';
  hgPaddleLeft.style.top = '0px';
  hgPaddleRight.style.top = '0px';
  sHgTop = makeServo(cx - HG_PADDLE_LEN / 2);
  sHgBottom = makeServo(cx - HG_PADDLE_LEN / 2);
  sHgLeft = makeServo(cy - HG_PADDLE_LEN / 2);
  sHgRight = makeServo(cy - HG_PADDLE_LEN / 2);
}

// No reaction horizon: the wall-first test below already guarantees that any
// contact we act on is one the dot will genuinely reach on its current heading,
// so there is nothing to gain by waiting — and waiting was costing the paddle
// the lead time it needed to actually get there.

// Cast the dot's trajectory against the zone (ray-vs-box) and hand a target to
// ONLY the face it will genuinely strike, and only once that strike is
// imminent. A path that misses — or passes by — leaves every paddle alone.
function updateHourglassPaddles(dcx, dcy, vx, vy) {
  const ocx = window.innerWidth / 2, ocy = window.innerHeight / 2;

  // Park every paddle first. Only the one face that's genuinely about to be
  // struck gets a live target below, so exactly one paddle can ever be moving —
  // the others hold dead still rather than drifting toward a stale target.
  sHgTop.target = sHgTop.cur;
  sHgBottom.target = sHgBottom.cur;
  sHgLeft.target = sHgLeft.cur;
  sHgRight.target = sHgRight.cur;

  const halfW = HG_SOLID_W + 17, halfH = HG_SOLID_H + 17; // centre-based extents
  const minX = ocx - halfW, maxX = ocx + halfW;
  const minY = ocy - halfH, maxY = ocy + halfH;

  // Slab method. A zero component means the ray runs parallel to that axis —
  // it only hits if the dot is already within that slab.
  let txmin, txmax;
  if (vx !== 0) { const a = (minX - dcx) / vx, b = (maxX - dcx) / vx; txmin = Math.min(a, b); txmax = Math.max(a, b); }
  else { if (dcx < minX || dcx > maxX) return false; txmin = -Infinity; txmax = Infinity; }

  let tymin, tymax;
  if (vy !== 0) { const a = (minY - dcy) / vy, b = (maxY - dcy) / vy; tymin = Math.min(a, b); tymax = Math.max(a, b); }
  else { if (dcy < minY || dcy > maxY) return false; tymin = -Infinity; tymax = Infinity; }

  const tEnter = Math.max(txmin, tymin);
  const tExit = Math.min(txmax, tymax);
  if (tEnter > tExit) return false;        // trajectory misses the zone

  // A contact only counts if it is genuinely still AHEAD of the dot.
  //
  // At the moment of impact — and for the frames the dot spends grazing the
  // surface on its way out — its centre sits exactly on this box, so tEnter
  // collapses to ~0 while tExit is still >= 0. The old guard only rejected
  // tExit < 0, so those frames sailed through; and with tEnter ~ 0 the slab
  // test's choice of face is essentially arbitrary. It would then hand a target
  // to some OTHER paddle at the dot's current spot — which is exactly the
  // paddle that twitches the instant a different paddle gets hit.
  if (tEnter <= 1e-3) return false;

  // If the dot meets a wall before it ever reaches the zone, this prediction is
  // moot — it'll leave on a whole new heading. Don't chase a contact that isn't
  // going to happen.
  const dh = 17;
  const wMinX = PADDLE_THICK + dh, wMaxX = window.innerWidth - PADDLE_THICK - dh;
  const wMinY = PADDLE_THICK + dh, wMaxY = window.innerHeight - PADDLE_THICK - dh;
  const tWx = vx > 0 ? (wMaxX - dcx) / vx : vx < 0 ? (wMinX - dcx) / vx : Infinity;
  const tWy = vy > 0 ? (wMaxY - dcy) / vy : vy < 0 ? (wMinY - dcy) / vy : Infinity;
  if (tEnter > Math.min(tWx, tWy)) return false;

  // Where on the frame the dot will actually TOUCH: the nearest point of the
  // solid to the dot's centre at the moment of contact. For a straight run this
  // point is fixed, so the target doesn't drift as the dot closes in.
  const ex = dcx + vx * tEnter - ocx, ey = dcy + vy * tEnter - ocy;
  const cpx = clamp(ex, -HG_SOLID_W, HG_SOLID_W);
  const cpy = clamp(ey, -HG_SOLID_H, HG_SOLID_H);

  const atCornerX = Math.abs(cpx) > HG_HALF_W;
  const atCornerY = Math.abs(cpy) > HG_HALF_H;

  // Corner collision — the one case where two paddles move. They converge and
  // form the corner themselves: the top/bottom paddle runs its end out to the
  // side paddle's OUTER edge (closing the square), and the side paddle stops
  // exactly where that row ends. They butt into an L — flush, no overlap, no
  // gap — instead of each stopping short and leaving a notch.
  if (atCornerX && atCornerY) {
    aim(cpy < 0 ? sHgTop : sHgBottom,
        cpx < 0 ? ocx - HG_SOLID_W : ocx + HG_SOLID_W - HG_PADDLE_LEN, tEnter);
    aim(cpx < 0 ? sHgLeft : sHgRight,
        cpy < 0 ? ocy - HG_HALF_H  : ocy + HG_HALF_H  - HG_PADDLE_LEN, tEnter);
    return true;
  }

  // Otherwise it's a straight run and only the one paddle moves.
  if (atCornerY) {
    const px = clamp(ocx + cpx - HG_PADDLE_LEN / 2, ocx - HG_SOLID_W, ocx + HG_SOLID_W - HG_PADDLE_LEN);
    aim(cpy < 0 ? sHgTop : sHgBottom, px, tEnter);
  } else {
    const py = clamp(ocy + cpy - HG_PADDLE_LEN / 2, ocy - HG_HALF_H, ocy + HG_HALF_H - HG_PADDLE_LEN);
    aim(cpx < 0 ? sHgLeft : sHgRight, py, tEnter);
  }
  return true;
}

// Glide every paddle toward whatever target it currently holds. Written as
// transforms so the compositor handles them — no layout, no repaint.
function applyServos(dt) {
  paddleTop.style.transform    = `translate3d(${stepServo(sWallTop, dt)}px,0,0)`;
  paddleBottom.style.transform = `translate3d(${stepServo(sWallBottom, dt)}px,0,0)`;
  paddleLeft.style.transform   = `translate3d(0,${stepServo(sWallLeft, dt)}px,0)`;
  paddleRight.style.transform  = `translate3d(0,${stepServo(sWallRight, dt)}px,0)`;
  hgPaddleTop.style.transform    = `translate3d(${stepServo(sHgTop, dt)}px,0,0)`;
  hgPaddleBottom.style.transform = `translate3d(${stepServo(sHgBottom, dt)}px,0,0)`;
  hgPaddleLeft.style.transform   = `translate3d(0,${stepServo(sHgLeft, dt)}px,0)`;
  hgPaddleRight.style.transform  = `translate3d(0,${stepServo(sHgRight, dt)}px,0)`;
}

function startFocusDot() {
  const dotWrap = document.getElementById('dot-wrap');
  const dotSize = 34;
  const boxW = window.innerWidth;
  const boxH = window.innerHeight;

  restHourglassPaddles();

  // Re-roll the spawn point if it lands inside the hourglass's exclusion zone.
  let x, y;
  do {
    x = Math.random() * (boxW - dotSize);
    y = Math.random() * (boxH - dotSize);
  } while (
    Math.abs(x + dotSize / 2 - boxW / 2) < HOURGLASS_HALF_W + HOURGLASS_BUFFER + dotSize / 2 &&
    Math.abs(y + dotSize / 2 - boxH / 2) < HOURGLASS_HALF_H + HOURGLASS_BUFFER + dotSize / 2
  );
  // Constant pace throughout — no speed-up over the window. A stimulus that
  // visibly escalates works against a flat, stable baseline, which is the
  // whole point of the 2-minute capture.
  const speed = 115; // px/sec
  const angle = Math.random() * Math.PI * 2;
  let vx = Math.cos(angle) * speed;
  let vy = Math.sin(angle) * speed;

  // Rest all four wall paddles centered on their wall until each is engaged.
  const restX = boxW / 2 - PADDLE_LEN / 2;
  const restY = boxH / 2 - PADDLE_LEN / 2;
  sWallTop = makeServo(restX);
  sWallBottom = makeServo(restX);
  sWallLeft = makeServo(restY);
  sWallRight = makeServo(restY);

  // Every bounce nudges the heading by a small random angle and keeps the dot
  // off near-vertical/near-horizontal runs, so the path never settles into the
  // tidy repeating diamond a pure mirror reflection produces. Speed is held
  // exactly constant — only the direction changes.
  function bounce() {
    const a = (Math.random() - 0.5) * 0.30;         // ±~8.5°
    const c = Math.cos(a), sn = Math.sin(a);
    let nvx = vx * c - vy * sn;
    let nvy = vx * sn + vy * c;

    let s = Math.hypot(nvx, nvy) || 1;
    const MIN_COMP = 0.26;                          // no axis-hugging paths
    if (Math.abs(nvx) < s * MIN_COMP) nvx = (nvx < 0 ? -1 : 1) * s * MIN_COMP;
    if (Math.abs(nvy) < s * MIN_COMP) nvy = (nvy < 0 ? -1 : 1) * s * MIN_COMP;

    s = Math.hypot(nvx, nvy) || 1;
    vx = nvx / s * speed;
    vy = nvy / s * speed;
  }

  let last = performance.now();
  function tick(now) {
    let dt = (now - last) / 1000;
    last = now;
    // Clamp huge frame gaps (background-tab throttling) so a single step can
    // never leap across a paddle without the collision test seeing it.
    if (dt > 0.05) dt = 0.05;

    const w = window.innerWidth;
    const h = window.innerHeight;

    // Bounce off the paddle's front face, not the raw wall — otherwise the
    // dot sinks past the paddle's thickness before reflecting.
    const minX = PADDLE_THICK, maxX = w - dotSize - PADDLE_THICK;
    const minY = PADDLE_THICK, maxY = h - dotSize - PADDLE_THICK;
    const ocx = w / 2, ocy = h / 2;
    const dotHalf = dotSize / 2;

    // Advance in sub-steps no larger than a few px so a fast dot can't tunnel
    // through the thin exclusion-zone faces between frames.
    const dist = Math.sqrt(vx * vx + vy * vy) * dt;
    const steps = Math.max(1, Math.ceil(dist / 6));
    const sdt = dt / steps;
    for (let s = 0; s < steps; s++) {
      x += vx * sdt;
      y += vy * sdt;

      if (x <= minX) { x = minX; vx = Math.abs(vx); bounce(); }
      if (x >= maxX) { x = maxX; vx = -Math.abs(vx); bounce(); }
      if (y <= minY) { y = minY; vy = Math.abs(vy); bounce(); }
      if (y >= maxY) { y = maxY; vy = -Math.abs(vy); bounce(); }

      // Inner obstacle: the hourglass zone, treated as a ROUNDED rectangle —
      // the solid rect grown by the dot's radius. A sharp grown rect makes the
      // dot reflect off a face while it's really in the corner, which is what
      // let it cut across a paddle. Bouncing off the nearest point of the solid
      // gives a true face bounce head-on and a proper diagonal deflection at
      // the corners, where the paddle ends actually meet.
      const ddx = (x + dotHalf) - ocx, ddy = (y + dotHalf) - ocy;
      if (Math.abs(ddx) < HG_SOLID_W && Math.abs(ddy) < HG_SOLID_H) {
        // Centre somehow inside the solid — eject the short way out.
        const ox = HG_SOLID_W - Math.abs(ddx) + dotHalf;
        const oy = HG_SOLID_H - Math.abs(ddy) + dotHalf;
        if (ox < oy) { x += ddx > 0 ? ox : -ox; vx = ddx > 0 ? Math.abs(vx) : -Math.abs(vx); }
        else         { y += ddy > 0 ? oy : -oy; vy = ddy > 0 ? Math.abs(vy) : -Math.abs(vy); }
        bounce();
      } else {
        // Nearest point on the paddle frame's outer surface to the dot's centre.
        const rx = Math.min(Math.max(ddx, -HG_SOLID_W), HG_SOLID_W);
        const ry = Math.min(Math.max(ddy, -HG_SOLID_H), HG_SOLID_H);
        const nx = ddx - rx, ny = ddy - ry;
        const d2 = nx * nx + ny * ny;
        if (d2 < dotHalf * dotHalf) {
          const d = Math.sqrt(d2) || 1e-4;
          const ux = nx / d, uy = ny / d;      // surface normal at contact
          x += ux * (dotHalf - d);             // rest exactly on the surface
          y += uy * (dotHalf - d);
          const vn = vx * ux + vy * uy;
          if (vn < 0) { vx -= 2 * vn * ux; vy -= 2 * vn * uy; }  // reflect
          bounce();
        }
      }
    }

    dotWrap.style.transform = `translate3d(${x}px,${y}px,0)`;

    const dcx = x + dotSize / 2, dcy = y + dotSize / 2;

    // The hourglass frame gets first refusal — it only ever engages when the dot
    // will genuinely reach it BEFORE any wall. If it takes the job, the wall set
    // stands down entirely, so exactly ONE paddle out of all eight is moving;
    // previously the middle and outer sets tracked independently and one of each
    // could be running at the same time.
    const hgEngaged = updateHourglassPaddles(dcx, dcy, vx, vy);

    sWallTop.target = sWallTop.cur;
    sWallBottom.target = sWallBottom.cur;
    sWallLeft.target = sWallLeft.cur;
    sWallRight.target = sWallRight.cur;

    if (!hgEngaged) {
      // Whichever wall it'll reach soonest — move just that paddle.
      const tRight  = vx > 0 ? (maxX - x) / vx : Infinity;
      const tLeft   = vx < 0 ? (x - minX) / -vx : Infinity;
      const tBottom = vy > 0 ? (maxY - y) / vy : Infinity;
      const tTop    = vy < 0 ? (y - minY) / -vy : Infinity;
      const minT = Math.min(tRight, tLeft, tBottom, tTop);

      const cx = clamp(dcx - PADDLE_LEN / 2, 0, w - PADDLE_LEN);
      const cy = clamp(dcy - PADDLE_LEN / 2, 0, h - PADDLE_LEN);

      if (minT === tTop) {
        aim(sWallTop, cx, minT);
      } else if (minT === tBottom) {
        aim(sWallBottom, cx, minT);
      } else if (minT === tLeft) {
        aim(sWallLeft, cy, minT);
      } else {
        aim(sWallRight, cy, minT);
      }
    }

    // Everything glides toward its target at a bounded rate — no teleporting.
    applyServos(dt);

    focusAnim = requestAnimationFrame(tick);
  }
  focusAnim = requestAnimationFrame(tick);
}

function stopFocusDot() {
  if (focusAnim) cancelAnimationFrame(focusAnim);
  focusAnim = null;
}

</script>

</body>
</html>
