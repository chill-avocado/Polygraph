<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Polygraph — Analyzing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf6ee;
  color: #4a4038;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.analyzing-holder {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.analyzing-grid-box {
  width: 112px;
  height: 112px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  place-items: center;
  margin-bottom: 24px;
}

.grid-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fbe9d4;
  transition: background .15s ease, transform .15s ease;
}

.grid-dot.lit {
  background: #ea9b4e;
  transform: scale(1.25);
}

.grid-dot.lit-2 {
  background: #eaab5c;
  transform: scale(1.12);
}

.grid-dot.lit-3 {
  background: #f5cd9c;
  transform: scale(1.05);
}

.analyzing-label {
  position: relative;
  display: inline-block;
  height: 1.3em;
  font-size: 1.05rem;
  letter-spacing: 0.04em;
  color: #a89a8c;
}

.analyzing-label .cursor {
  position: absolute;
  top: 0;
  left: 100%;
  color: #ea9b4e;
  font-weight: 700;
  animation: blink 0.8s steps(1) infinite;
}

.analyzing-label .letter {
  color: #fbe9d4;
  transition: color .18s ease;
  animation: letterShine .3s ease-out;
}

@keyframes letterShine {
  0%   { filter: brightness(1.7); }
  100% { filter: brightness(1); }
}

.analyzing-label .letter.set {
  color: #ea9b4e;
}

.analyzing-label .letter.dry {
  color: #a89a8c;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  50.01%, 100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="analyzing-holder">
  <div class="analyzing-grid-box" id="grid-box"></div>
  <div class="analyzing-label"><span id="type-text"></span><span class="cursor">|</span></div>
</div>

<script>
"use strict";
// Wandering path through the 3x3 grid (indices 0-8, row-major). Loops forever — no
// auto-transition to a result on this page, it's just the loader in isolation.
const GRID_PATH = [4, 1, 0, 3, 6, 7, 8, 5, 2, 1, 4, 7, 6, 3, 0, 1, 2, 5, 8, 7, 4];

const gridBox = document.getElementById('grid-box');
gridBox.innerHTML = Array.from({length: 9}, () => '<div class="grid-dot"></div>').join('');
const dotEls = document.querySelectorAll('#grid-box .grid-dot');

let step = 0;
setInterval(() => {
  dotEls.forEach(d => d.classList.remove('lit', 'lit-2', 'lit-3'));

  const cur  = GRID_PATH[step % GRID_PATH.length];
  const prev = GRID_PATH[(step - 1 + GRID_PATH.length) % GRID_PATH.length];
  const prev2 = GRID_PATH[(step - 2 + GRID_PATH.length) % GRID_PATH.length];

  if (step >= 2 && prev2 !== cur && prev2 !== prev) dotEls[prev2].classList.add('lit-3');
  if (step >= 1 && prev !== cur) dotEls[prev].classList.add('lit-2');
  dotEls[cur].classList.add('lit');

  step++;
}, 200);

// ── Typewriter loop for the label text ──
const WORD = 'Analyzing';
const TYPE_MS = 140;
const ERASE_MS = 55;
const HOLD_MS = 3000;
const typeEl = document.getElementById('type-text');

function typewriterLoop() {
  typeEl.innerHTML = '';
  let i = 0;
  const typeStep = () => {
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = WORD[i];
    typeEl.appendChild(span);
    // Wet ink → darker "set" stage → final lighter "dry" resting color.
    requestAnimationFrame(() => requestAnimationFrame(() => span.classList.add('set')));
    setTimeout(() => span.classList.replace('set', 'dry'), 120);

    i++;
    if (i < WORD.length) {
      setTimeout(typeStep, TYPE_MS);
    } else {
      setTimeout(eraseStep, HOLD_MS);
    }
  };
  const eraseStep = () => {
    const step = () => {
      if (typeEl.lastChild) {
        typeEl.removeChild(typeEl.lastChild);
        setTimeout(step, ERASE_MS);
      } else {
        setTimeout(typewriterLoop, 300);
      }
    };
    step();
  };
  typeStep();
}

typewriterLoop();
</script>

</body>
</html>
