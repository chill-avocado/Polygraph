<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Polygraph — Baseline Questions</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf6ee;
  color: #4a4038;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.page {
  width: 100%;
  max-width: 480px;
  text-align: center;
}

.eyebrow {
  font-size: .8rem;
  letter-spacing: 0.1em;
  color: #c9a99a;
  margin-bottom: 30px;
}

.card {
  background: #ffffff;
  border-radius: 20px;
  padding: 50px 36px;
  box-shadow: 0 2px 10px rgba(150,120,100,0.08);
}

.question {
  font-size: 1.4rem;
  font-weight: 600;
  color: #6b5b52;
  line-height: 1.5;
  margin-bottom: 42px;
}

.dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 34px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #f2e9dd;
  transition: background .2s;
}

.dot.active {
  background: #e6bcb0;
}

.dot.done {
  background: #cdeadb;
}

.next-btn {
  background: #f3d9d3;
  color: #6b4a42;
  border: none;
  border-radius: 999px;
  padding: 13px 42px;
  font-size: .95rem;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: background .2s;
}

.next-btn:hover {
  background: #eec3ba;
}

.next-btn:disabled {
  background: #f2e9dd;
  color: #c3b6a8;
  cursor: default;
}

.done-msg {
  font-size: 1.1rem;
  color: #6b5b52;
  font-weight: 600;
}

.capture-wrap {
  height: 20px;
  margin-bottom: 22px;
}

.capture-label {
  font-size: .72rem;
  letter-spacing: 0.06em;
  color: #b9d9c6;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.capture-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #b9d9c6;
  animation: pulse 1s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: .35; }
  50% { opacity: 1; }
}

.skip-demo {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 50;
  background: transparent;
  border: 1px dashed #d3c3b4;
  color: #a89a8c;
  font-size: .72rem;
  letter-spacing: 0.03em;
  padding: 6px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-family: Arial, sans-serif;
}

.skip-demo:hover {
  background: #fdfaf4;
  color: #6b5b52;
}
</style>
</head>
<body>

<button class="skip-demo" onclick="skipQuestions()">Skip (demo)</button>

<div class="page">
  <div class="eyebrow" id="eyebrow">Baseline Questions</div>

  <div class="card">
    <div class="dots" id="dots"></div>
    <div class="question" id="question-text"></div>
    <div class="capture-wrap" id="capture-wrap"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next</button>
  </div>
</div>

<script>
"use strict";
const QUESTIONS = [
  "Is two plus two equal to four?",
  "Is ice cold?",
  "Do fish live in water?",
  "Is ten greater than five?",
  "Are you currently sitting in this room?"
];

const CAPTURE_MIN_MS = 6000; // minimum response-window duration per question (skeleton only, no sensor hookup yet)

let idx = 0;
let capturing = false;

function renderDots() {
  const wrap = document.getElementById('dots');
  wrap.innerHTML = '';
  QUESTIONS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
    wrap.appendChild(d);
  });
}

function renderQuestion() {
  renderDots();
  const textEl = document.getElementById('question-text');
  const btn = document.getElementById('next-btn');
  document.getElementById('capture-wrap').innerHTML = '';

  if (idx < QUESTIONS.length) {
    textEl.textContent = QUESTIONS[idx];
    btn.textContent = idx === QUESTIONS.length - 1 ? 'Finish' : 'Next';
    btn.disabled = false;
  } else {
    textEl.innerHTML = '<span class="done-msg">Baseline questions complete.</span>';
    // Full baseline (resting + calibration) is now captured — persist it.
    markBaselineComplete();
    btn.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Continue';
    btn.onclick = () => location.href = 'baseline_saved.html';
  }
}

function markBaselineComplete() {
  try {
    const id = localStorage.getItem('polygraph_current');
    const list = JSON.parse(localStorage.getItem('polygraph_profiles')) || [];
    const p = list.find(x => x.id === id);
    if (p) {
      p.baseline = true;
      p.baselineAt = new Date().toISOString();
      localStorage.setItem('polygraph_profiles', JSON.stringify(list));
    }
  } catch (e) { /* opened directly, no profile context — proceed anyway */ }
}

// Show the active subject in the eyebrow for continuity across the flow.
(function showSubject() {
  try {
    const id = localStorage.getItem('polygraph_current');
    const p = (JSON.parse(localStorage.getItem('polygraph_profiles')) || []).find(x => x.id === id);
    if (p) document.getElementById('eyebrow').textContent = 'Baseline Questions · ' + p.name;
  } catch (e) {}
})();

function startCapture(onDone) {
  capturing = true;
  const btn = document.getElementById('next-btn');
  const captureWrap = document.getElementById('capture-wrap');
  btn.disabled = true;
  captureWrap.innerHTML = '<div class="capture-label"><span class="capture-dot"></span>Capturing response…</div>';

  // Enforce a minimum window, then let the examiner decide when the
  // response has settled instead of cutting it off on a fixed timer.
  setTimeout(() => {
    captureWrap.innerHTML = '<div class="capture-label"><span class="capture-dot"></span>Capturing response…</div>';
    btn.disabled = false;
    btn.textContent = 'Response Settled';
    btn.onclick = () => {
      capturing = false;
      btn.onclick = nextQuestion;
      onDone();
    };
  }, CAPTURE_MIN_MS);
}

function nextQuestion() {
  if (capturing || idx >= QUESTIONS.length) return;
  startCapture(() => {
    idx++;
    renderQuestion();
  });
}

// ── Demo-only: jump straight past all remaining questions and capture waits ──
function skipQuestions() {
  capturing = false;
  idx = QUESTIONS.length;
  renderQuestion();
}

renderQuestion();
</script>

</body>
</html>
