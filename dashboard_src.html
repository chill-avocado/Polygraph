<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Polygraph</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf6ee;
  color: #4a4038;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.landing {
  text-align: center;
}

.landing h1 {
  font-size: 2.4rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: #6b5b52;
  margin-bottom: 14px;
}

.landing p {
  font-size: 1rem;
  color: #a89a8c;
  margin-bottom: 40px;
}

.start-btn {
  background: #f3d9d3;
  color: #6b4a42;
  border: none;
  border-radius: 999px;
  padding: 14px 42px;
  font-size: 1rem;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: background .2s;
}

.start-btn:hover {
  background: #eec3ba;
}
</style>
</head>
<body>

<div class="landing">
  <h1>Polygraph</h1>
  <p>A calmer way to read the truth.</p>
  <button class="start-btn" onclick="location.href='profiles.html'">Start Session</button>
</div>

</body>
</html>
