<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Polygraph — Baseline Saved</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf6ee;
  color: #4a4038;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.page {
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.check-ring {
  width: 84px;
  height: 84px;
  border-radius: 50%;
  background: #e3f2ea;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 26px;
  animation: pop .4s ease-out;
}

@keyframes pop {
  0%   { transform: scale(0.6); opacity: 0; }
  60%  { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}

.check-ring svg { width: 40px; height: 40px; }

.check-ring path {
  fill: none;
  stroke: #6fae8b;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 40;
  stroke-dashoffset: 40;
  animation: draw .45s .2s ease-out forwards;
}

@keyframes draw {
  to { stroke-dashoffset: 0; }
}

h1 {
  font-size: 1.5rem;
  font-weight: 600;
  color: #6b5b52;
  letter-spacing: 0.03em;
  margin-bottom: 10px;
}

.who {
  font-size: .95rem;
  color: #8a7c70;
  margin-bottom: 6px;
}

.sub {
  font-size: .88rem;
  color: #a89a8c;
  line-height: 1.5;
  margin-bottom: 36px;
}

.actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn-primary {
  background: #f3d9d3;
  color: #6b4a42;
  border: none;
  border-radius: 999px;
  padding: 14px;
  font-size: .95rem;
  letter-spacing: 0.03em;
  cursor: pointer;
  transition: background .2s;
}

.btn-primary:hover { background: #eec3ba; }

.btn-secondary {
  background: transparent;
  color: #a89a8c;
  border: 1px solid #ecdfd2;
  border-radius: 999px;
  padding: 13px;
  font-size: .9rem;
  cursor: pointer;
  transition: background .2s;
}

.btn-secondary:hover { background: #fdfaf4; }
</style>
</head>
<body>

<div class="page">
  <div class="check-ring">
    <svg viewBox="0 0 40 40">
      <path d="M11 20.5 L17.5 27 L29 14"/>
    </svg>
  </div>

  <h1>Baseline Saved</h1>
  <div class="who" id="who"></div>
  <p class="sub">The resting baseline has been recorded. You can begin the examination whenever you're ready.</p>

  <div class="actions">
    <button class="btn-primary" onclick="location.href='live_test.html'">Begin Test</button>
    <button class="btn-secondary" onclick="location.href='profiles.html'">Back to Profiles</button>
  </div>
</div>

<script>
"use strict";
const PROFILES_KEY = 'polygraph_profiles';
const CURRENT_KEY = 'polygraph_current';

function loadProfiles() {
  try { return JSON.parse(localStorage.getItem(PROFILES_KEY)) || []; }
  catch (e) { return []; }
}

(function showWho() {
  const id = localStorage.getItem(CURRENT_KEY);
  const p = loadProfiles().find(x => x.id === id);
  if (p) document.getElementById('who').textContent = p.name;
})();
</script>

</body>
</html>
